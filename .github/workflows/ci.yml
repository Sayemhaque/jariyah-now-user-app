# CI pipeline — runs on every PR and push to main.
# Fails fast on the cheapest check first: lint → typecheck → test → build.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # The env validator (src/lib/env.ts) requires DATABASE_URL at boot.
      # The CI run doesn't touch the DB, but the modules that import env.ts
      # still get evaluated — so give it a placeholder.
      DATABASE_URL: file:./ci-placeholder.db

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      # 1. Lint — cheapest check, runs in seconds.
      - name: Lint
        run: bun run lint

      # 2. Typecheck — catches type errors the runtime might not.
      - name: Typecheck
        run: bunx tsc --noEmit

      # 3. Tests — unit + integration. Fast feedback on logic regressions.
      - name: Test
        run: bun run test

      # 4. Build — slowest, but verifies the whole thing compiles + bundles.
      - name: Build
        run: bun run build
